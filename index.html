<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Filter — Lozux</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --o1: #FF5500;
  --o2: #FF8C00;
  --o3: #FFAA44;
  --o4: #FFD080;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.07);
  --text: #FFFFFF;
  --text-2: rgba(255,255,255,0.55);
  --text-3: rgba(255,255,255,0.25);
  --green: #3dba6e;
  --green-glass: rgba(61,186,110,0.12);
}

html, body {
  min-height: 100vh;
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--text);
  overflow-x: hidden;
}

body {
  background: #0a0a0a;
  position: relative;
}

/* AMBIENT BACKGROUND */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.55;
}

.orb-1 {
  width: 600px; height: 600px;
  top: -200px; right: -100px;
  background: radial-gradient(circle, #FF5500 0%, #FF3300 40%, transparent 70%);
  animation: drift1 12s ease-in-out infinite alternate;
}

.orb-2 {
  width: 500px; height: 500px;
  top: 40%; left: -150px;
  background: radial-gradient(circle, #FF8C00 0%, #FF6600 50%, transparent 70%);
  opacity: 0.3;
  animation: drift2 15s ease-in-out infinite alternate;
}

.orb-3 {
  width: 400px; height: 400px;
  bottom: -100px; right: 20%;
  background: radial-gradient(circle, #FF4400 0%, transparent 70%);
  opacity: 0.2;
  animation: drift3 18s ease-in-out infinite alternate;
}

@keyframes drift1 {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(-40px, 40px) scale(1.08); }
}
@keyframes drift2 {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(30px, -50px) scale(1.05); }
}
@keyframes drift3 {
  from { transform: translate(0, 0); }
  to   { transform: translate(-20px, -30px) scale(1.1); }
}

/* NAV */
nav {
  position: relative; z-index: 10;
  display: flex; align-items: center;
  padding: 0 28px; height: 56px;
  background: rgba(10,10,10,0.6);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--glass-border);
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
}

.nav-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px rgba(255,85,0,0.4);
}
.nav-icon svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; }

.nav-name {
  font-size: 14px; font-weight: 600;
  background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}

.nav-tag {
  margin-left: 10px;
  font-size: 10px; font-weight: 500;
  color: var(--o3);
  border: 1px solid rgba(255,170,68,0.25);
  background: rgba(255,170,68,0.08);
  padding: 3px 9px; border-radius: 20px;
  letter-spacing: 0.04em;
}

.nav-right { margin-left: auto; font-size: 12px; color: var(--text-3); cursor: pointer; transition: color 0.15s; }
.nav-right:hover { color: var(--text-2); }

/* MAIN */
.main {
  position: relative; z-index: 1;
  padding: 36px 28px 80px;
  max-width: 1100px;
  margin: 0 auto;
  animation: pageIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes pageIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* SECTION TITLE */
.section-label {
  font-size: 11px; font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* GLASS CARD */
.glass-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  overflow: hidden;
  position: relative;
}

.glass-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
  border-radius: inherit;
}

/* MODE SWITCHER */
.mode-switch {
  display: inline-flex;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 3px;
  margin-bottom: 14px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.mode-btn {
  font-size: 12px; font-weight: 500;
  color: var(--text-3);
  background: transparent;
  border: none;
  padding: 6px 14px;
  border-radius: 18px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.15s;
  letter-spacing: -0.01em;
}

.mode-btn:hover { color: var(--text-2); }

.mode-btn.active {
  color: white;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  box-shadow: 0 0 14px rgba(255,85,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
}

/* PASTE ZONE */
.paste-zone {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 28px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
}

.paste-zone::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
  border-radius: inherit;
  pointer-events: none;
}

.paste-textarea {
  width: 100%;
  min-height: 180px;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'SF Mono', Menlo, monospace;
  font-size: 12px;
  color: var(--text);
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
  position: relative;
  z-index: 1;
}

.paste-textarea::placeholder { color: var(--text-3); }
.paste-textarea:focus { border-color: rgba(255,140,0,0.4); }

.paste-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px;
  gap: 12px;
  position: relative;
  z-index: 1;
}

.paste-hint { font-size: 11px; color: var(--text-3); }
.paste-hint span { color: var(--o3); }

.btn-load {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  color: white;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  border: none; padding: 8px 18px;
  border-radius: 20px; cursor: pointer;
  box-shadow: 0 0 20px rgba(255,85,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  transition: all 0.2s ease;
  letter-spacing: -0.01em;
}

.btn-load:hover {
  box-shadow: 0 0 32px rgba(255,85,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: translateY(-1px);
}

.btn-load:active { transform: scale(0.97); }
.btn-load:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* UPLOAD ZONE */
.upload-zone {
  border: 1.5px dashed rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 48px 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px;
  cursor: pointer;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: all 0.25s ease;
  margin-bottom: 28px;
  position: relative;
}

.upload-zone::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
  border-radius: inherit;
  pointer-events: none;
}

.upload-zone:hover, .upload-zone.over {
  border-color: rgba(255,140,0,0.4);
  background: rgba(255,85,0,0.05);
}

.upload-bubble {
  width: 58px; height: 58px;
  border-radius: 16px;
  background: linear-gradient(145deg, var(--o1), var(--o2), var(--o3));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 32px rgba(255,85,0,0.35), 0 0 80px rgba(255,85,0,0.1), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
  position: relative; z-index: 1;
}

.upload-zone:hover .upload-bubble {
  transform: translateY(-3px);
  box-shadow: 0 0 44px rgba(255,85,0,0.5), 0 0 100px rgba(255,85,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
}

.upload-bubble svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 1.8; }

.upload-main { font-size: 14px; font-weight: 500; color: var(--text); position: relative; z-index: 1; }
.upload-sub  { font-size: 12px; color: var(--text-3); position: relative; z-index: 1; }
.upload-sub span { color: var(--o3); }

input[type="file"] { display: none; }

/* DIVIDER */
.divider { height: 1px; background: var(--glass-border); margin: 24px 0; }

/* TABS */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--glass-border);
  margin-bottom: 20px;
}

.tab {
  font-size: 13px; font-weight: 500;
  color: var(--text-3);
  padding: 10px 0; margin-right: 24px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.tab.active {
  color: var(--text);
  border-bottom-color: var(--o2);
}

/* STATS ROW */
.stats-row {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 20px;
}

.stat-chip {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-2);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 5px 13px; border-radius: 20px;
  backdrop-filter: blur(12px);
}

.stat-chip b { font-weight: 600; color: var(--text); }
.stat-chip b.g { color: var(--green); }
.stat-chip b.o { color: var(--o3); }

/* ACTIONS */
.action-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}

.btn-filter {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  color: white;
  background: linear-gradient(135deg, var(--o1), var(--o2));
  border: none; padding: 8px 18px;
  border-radius: 20px; cursor: pointer;
  box-shadow: 0 0 20px rgba(255,85,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  transition: all 0.2s ease;
  letter-spacing: -0.01em;
}

.btn-filter:hover {
  box-shadow: 0 0 32px rgba(255,85,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: translateY(-1px);
}

.btn-filter:active { transform: scale(0.97); }
.btn-filter svg { width: 13px; height: 13px; stroke: white; fill: none; stroke-width: 2.5; }

.btn-download {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: var(--text-2);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  padding: 8px 18px; border-radius: 20px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.15s;
  letter-spacing: -0.01em;
}

.btn-download:hover { color: var(--text); background: var(--glass-hover); }
.btn-download svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

.btn-filter.busy { opacity: 0.6; pointer-events: none; }

/* TABLE CARD */
.table-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}

.table-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}

.table-scroll {
  overflow: auto;
  max-height: 500px;
}

.table-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }

thead th {
  padding: 10px 16px;
  text-align: left;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--text-3);
  border-bottom: 1px solid var(--glass-border);
  background: rgba(0,0,0,0.2);
  position: sticky; top: 0; z-index: 2;
  backdrop-filter: blur(12px);
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.1s;
  animation: rowIn 0.2s ease both;
}

@keyframes rowIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

tbody tr:hover { background: rgba(255,255,255,0.03); }

td {
  padding: 9px 16px; font-size: 12px;
  color: var(--text-2);
  white-space: nowrap; max-width: 220px;
  overflow: hidden; text-overflow: ellipsis;
}

td.em { color: var(--text); font-weight: 500; }

.tag {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 5px;
}

.tag.gmail { background: var(--green-glass); color: var(--green); }
.tag.other { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); }

/* EMPTY */
.empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 64px 24px;
}

.empty svg { width: 28px; height: 28px; stroke: rgba(255,255,255,0.1); fill: none; stroke-width: 1.5; }
.empty p { font-size: 13px; color: var(--text-3); }

@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<nav>
  <div class="nav-logo">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <span class="nav-name">Lozux</span>
    <span class="nav-tag">CSV FILTER</span>
  </div>
  <span class="nav-right">Sign out</span>
</nav>

<div class="main">

  <div class="section-label">Input</div>

  <div class="mode-switch">
    <button class="mode-btn active" id="modeUpload" onclick="setMode('upload')">Upload file</button>
    <button class="mode-btn" id="modePaste" onclick="setMode('paste')">Paste data</button>
  </div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".csv">
    <div class="upload-bubble">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div class="upload-main">Drop your CSV here or click to browse</div>
    <div class="upload-sub">Uploading to: <span id="uploadLabel">—</span></div>
  </div>

  <div class="paste-zone" id="pasteZone" style="display:none">
    <textarea class="paste-textarea" id="pasteArea" placeholder="firstname,email&#10;Mike,michelinplays89@gmail.com&#10;EFRAIN,bnuurae@gmail.com&#10;&quot;Stephen Edward&quot;,stepsimms@gmail.com"></textarea>
    <div class="paste-footer">
      <div class="paste-hint">First line must be the header row (e.g. <span>firstname,email</span>)</div>
      <button class="btn-load" id="loadBtn" onclick="loadFromPaste()">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Load
      </button>
    </div>
  </div>

  <div class="divider" id="divider" style="display:none"></div>

  <div class="tabs" id="tabs" style="display:none">
    <div class="tab active" id="tabAll" onclick="switchTab('all')">All Rows</div>
    <div class="tab" id="tabGmail" onclick="switchTab('gmail')">Gmail Only</div>
  </div>

  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-chip">Total <b id="sTotal">—</b></div>
    <div class="stat-chip">Gmail <b class="g" id="sGmail">—</b></div>
    <div class="stat-chip">Other <b id="sOther">—</b></div>
    <div class="stat-chip">Rate <b class="o" id="sRate">—</b></div>
  </div>

  <div class="action-row" id="actionRow" style="display:none">
    <button class="btn-filter" id="filterBtn" onclick="runFilter()">
      <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filter Gmail
    </button>
    <button class="btn-download" id="dlBtn" onclick="downloadCSV()" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Download CSV
    </button>
  </div>

  <div class="table-card" id="tableCard" style="display:none">
    <div class="table-scroll" id="tableScroll">
      <div class="empty">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="15" x2="12" y2="15"/></svg>
        <p>No data loaded</p>
      </div>
    </div>
  </div>

</div>

<script>
let parsed = { headers: [], rows: [] };
let gmailRows = [];
let currentTab = 'all';
let sourceLabel = '—';
let currentMode = 'upload';

const zone = document.getElementById('uploadZone');
const inp  = document.getElementById('fileInput');

zone.addEventListener('click', () => inp.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
inp.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeUpload').classList.toggle('active', mode === 'upload');
  document.getElementById('modePaste').classList.toggle('active', mode === 'paste');
  document.getElementById('uploadZone').style.display = mode === 'upload' ? 'flex' : 'none';
  document.getElementById('pasteZone').style.display = mode === 'paste' ? 'block' : 'none';
}

function loadFromPaste() {
  const txt = document.getElementById('pasteArea').value;
  if (!txt.trim()) return;
  sourceLabel = 'pasted data';
  loadText(txt);
}

function parseCSV(txt) {
  const lines = txt.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };
  const p = s => {
    const a = []; let c = '', q = false;
    for (const ch of s) {
      if (ch === '"') q = !q;
      else if (ch === ',' && !q) { a.push(c.trim()); c = ''; }
      else c += ch;
    }
    a.push(c.trim()); return a;
  };
  return { headers: p(lines[0]), rows: lines.slice(1).filter(l => l.trim()).map(p) };
}

function emailCol(h) {
  const low = h.map(v => v.toLowerCase().replace(/\s/g, ''));
  let i = low.findIndex(v => v === 'email');
  if (i < 0) i = low.findIndex(v => v === 'e-mail');
  if (i < 0) i = low.findIndex(v => v.includes('email') || v.includes('mail'));
  return i < 0 ? 1 : i;
}

function loadFile(file) {
  sourceLabel = file.name.replace(/\.csv$/i, '');
  const r = new FileReader();
  r.onload = e => loadText(e.target.result);
  r.readAsText(file);
}

function loadText(txt) {
  parsed = parseCSV(txt);
  if (!parsed.headers.length) return;

  const ec = emailCol(parsed.headers);
  gmailRows = parsed.rows.filter(r => (r[ec] || '').toLowerCase().endsWith('@gmail.com'));

  document.getElementById('uploadLabel').innerHTML = `<span style="color:var(--o3)">${x(sourceLabel)}</span>`;

  document.getElementById('sTotal').textContent = parsed.rows.length;
  document.getElementById('sGmail').textContent = gmailRows.length;
  document.getElementById('sOther').textContent = parsed.rows.length - gmailRows.length;
  document.getElementById('sRate').textContent = parsed.rows.length ? Math.round(gmailRows.length / parsed.rows.length * 100) + '%' : '—';

  document.getElementById('divider').style.display = 'block';
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('statsRow').style.display = 'flex';
  document.getElementById('actionRow').style.display = 'flex';
  document.getElementById('tableCard').style.display = 'block';
  document.getElementById('dlBtn').style.display = 'none';

  currentTab = 'all';
  document.getElementById('tabAll').className = 'tab active';
  document.getElementById('tabGmail').className = 'tab';
  render(parsed.rows, ec);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').className = 'tab' + (tab === 'all' ? ' active' : '');
  document.getElementById('tabGmail').className = 'tab' + (tab === 'gmail' ? ' active' : '');
  const ec = emailCol(parsed.headers);
  render(tab === 'gmail' ? gmailRows : parsed.rows, ec);
}

function runFilter() {
  if (!parsed.rows.length) return;
  const btn = document.getElementById('filterBtn');
  btn.classList.add('busy');
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="animation:spin 0.6s linear infinite" width="13" height="13" fill="none" stroke="white" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Filtering…`;

  setTimeout(() => {
    currentTab = 'gmail';
    document.getElementById('tabAll').className = 'tab';
    document.getElementById('tabGmail').className = 'tab active';
    const ec = emailCol(parsed.headers);
    render(gmailRows, ec);
    document.getElementById('dlBtn').style.display = 'flex';
    btn.classList.remove('busy');
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="white" stroke-width="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> Filter Gmail`;
  }, 300);
}

function render(rows, ec) {
  const maxC = Math.min(parsed.headers.length, 6);
  const cols = [ec];
  for (let i = 0; i < parsed.headers.length && cols.length < maxC; i++) {
    if (i !== ec) cols.push(i);
  }

  if (!rows.length) {
    document.getElementById('tableScroll').innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>No rows to display</p></div>`;
    return;
  }

  let h = `<table><thead><tr>`;
  cols.forEach(ci => h += `<th>${x(parsed.headers[ci] || '')}</th>`);
  h += `<th>Type</th></tr></thead><tbody>`;

  rows.forEach((row, ri) => {
    const isG = (row[ec] || '').toLowerCase().endsWith('@gmail.com');
    h += `<tr style="animation-delay:${Math.min(ri * 7, 180)}ms">`;
    cols.forEach(ci => h += ci === ec ? `<td class="em">${x(row[ci] || '')}</td>` : `<td>${x(row[ci] || '')}</td>`);
    h += `<td><span class="tag ${isG ? 'gmail' : 'other'}">${isG ? 'Gmail' : 'Other'}</span></td></tr>`;
  });

  h += `</tbody></table>`;
  document.getElementById('tableScroll').innerHTML = h;
}

function downloadCSV() {
  if (!gmailRows.length) return;
  const safe = sourceLabel && sourceLabel !== '—' && sourceLabel !== 'pasted data'
    ? sourceLabel.replace(/[^a-z0-9\-_ ]/gi, '').trim() + ' - gmail'
    : 'gmail_only';
  const input = window.prompt('Save as (filename, no extension):', safe);
  if (input === null) return;
  const name = (input.trim() || safe).replace(/\.csv$/i, '');
  const e2 = v => { const s = String(v); return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s; };
  const out = [parsed.headers.map(e2).join(','), ...gmailRows.map(r => r.map(e2).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([out], { type: 'text/csv' }));
  a.download = name + '.csv'; a.click();
}

function x(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
</script>
</body>
</html>
